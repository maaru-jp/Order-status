<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAARU 訂單進度查詢</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --jp-bg: #f6f1ea;
      --jp-cream: #fffdf9;
      --jp-paper: #fff9f4;
      --jp-ink: #4a4a4a;
      --jp-ink-soft: #6f6a63;
      --jp-sakura: #e8a0a0;
      --jp-sakura-deep: #d67b7b;
      --jp-matcha: #7d9d8c;
      --jp-matcha-deep: #5f8574;
      --jp-border: #eadfd6;
      --jp-shadow: 0 10px 28px rgba(90, 72, 60, 0.08);
      --jp-radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Noto Sans TC", "Noto Sans JP", "PingFang TC", sans-serif;
      color: var(--jp-ink);
      background:
        radial-gradient(circle at 12% 8%, rgba(232, 160, 160, 0.18) 0%, transparent 42%),
        radial-gradient(circle at 88% 92%, rgba(125, 157, 140, 0.14) 0%, transparent 40%),
        var(--jp-bg);
      letter-spacing: 0.02em;
    }

    .app {
      display: flex;
      min-height: 100vh;
    }

    /* 左側品牌區 */
    .brand {
      width: 280px;
      background: linear-gradient(180deg, #fff9f4 0%, #f8ebe4 100%);
      padding: 36px 24px;
      text-align: center;
      border-right: 1px solid var(--jp-border);
      position: relative;
      overflow: visible;
    }

    .brand::before {
      content: "";
      position: absolute;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: rgba(232, 160, 160, 0.12);
      top: -60px;
      right: -50px;
    }

    .brand img {
      width: 132px;
      margin-bottom: 18px;
      border-radius: 50%;
      border: 3px solid #fff;
      box-shadow: var(--jp-shadow);
      position: relative;
      z-index: 1;
    }

    .brand h2 {
      font-size: 20px;
      margin: 8px 0 6px;
      font-weight: 700;
      color: #3f3a36;
      letter-spacing: 0.08em;
      position: relative;
      z-index: 1;
    }

    .brand p {
      font-size: 13px;
      color: var(--jp-ink-soft);
      line-height: 1.6;
      position: relative;
      z-index: 1;
    }

    .brand-badge {
      display: block;
      position: relative;
      z-index: 2;
      width: fit-content;
      max-width: 100%;
      margin: 14px auto 0;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      color: #b85c5c;
      background: #fff;
      border: 1px solid #e8b0b0;
      letter-spacing: 0.06em;
      line-height: 1.4;
    }

    /* 右側查詢區 */
    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 20px;
    }

    .container {
      background: var(--jp-cream);
      width: 100%;
      max-width: 900px;
      padding: 28px 26px 24px;
      border-radius: 22px;
      border: 1px solid var(--jp-border);
      box-shadow: var(--jp-shadow);
    }

    .page-head {
      text-align: center;
      margin-bottom: 22px;
    }

    h1 {
      font-size: 22px;
      margin: 0 0 6px;
      font-weight: 700;
      color: #3f3a36;
      letter-spacing: 0.06em;
    }

    .page-sub {
      font-size: 13px;
      color: var(--jp-ink-soft);
    }

    .search-panel {
      background: var(--jp-paper);
      border: 1px solid var(--jp-border);
      border-radius: var(--jp-radius);
      padding: 16px;
      margin-bottom: 8px;
    }

    label {
      font-size: 13px;
      color: var(--jp-ink-soft);
      font-weight: 500;
    }

    input {
      width: 100%;
      padding: 13px 14px;
      margin-top: 8px;
      margin-bottom: 14px;
      font-size: 16px;
      border: 1px solid var(--jp-border);
      border-radius: 12px;
      background: #fff;
      color: var(--jp-ink);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus {
      outline: none;
      border-color: var(--jp-sakura);
      box-shadow: 0 0 0 3px rgba(232, 160, 160, 0.2);
    }

    .btn-search {
      width: 100%;
      padding: 13px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #fff;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: linear-gradient(135deg, var(--jp-sakura) 0%, var(--jp-sakura-deep) 100%);
      box-shadow: 0 6px 14px rgba(214, 123, 123, 0.28);
      transition: transform 0.15s ease, box-shadow 0.2s ease;
    }

    .btn-search:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(214, 123, 123, 0.34);
    }

    .result, .error {
      margin-top: 22px;
      padding: 18px;
      border-radius: var(--jp-radius);
      display: none;
      font-size: 14px;
    }

    .result {
      background: linear-gradient(180deg, #fffaf6 0%, #fff5ee 100%);
      border: 1px solid var(--jp-border);
    }

    .result-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      align-items: start;
    }

    .summary-card,
    .timeline-card {
      background: #fff;
      border: 1px solid var(--jp-border);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 4px 14px rgba(90, 72, 60, 0.04);
    }

    .card-title {
      font-size: 13px;
      color: var(--jp-sakura-deep);
      margin-bottom: 12px;
      font-weight: 700;
      letter-spacing: 0.14em;
      padding-bottom: 8px;
      border-bottom: 1px dashed var(--jp-border);
    }

    .error {
      background: #fff3f1;
      color: #b44a4a;
      border: 1px solid #f2d0cb;
    }

    .summary-top {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 14px;
      margin-bottom: 10px;
    }

    .item {
      margin-bottom: 0;
      line-height: 1.55;
      color: var(--jp-ink);
      font-size: 13px;
    }

    .item-products {
      margin-top: 4px;
    }

    .item-products > .product-content {
      display: block;
      width: 100%;
      margin-top: 6px;
    }

    .product-content {
      display: block;
      width: 100%;
      max-width: 100%;
    }

    .product-list {
      margin: 0;
      padding: 10px;
      background: #fff;
      border: 1px solid var(--jp-border);
      border-radius: 12px;
      list-style: none;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .product-summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin: 0 0 8px;
      padding: 10px 12px;
      border-radius: 12px;
      background: linear-gradient(135deg, #f4faf6 0%, #fff8f4 100%);
      border: 1px solid #dce8e2;
      font-size: 13px;
      color: var(--jp-ink-soft);
      grid-column: 1 / -1;
    }

    .product-summary strong {
      color: var(--jp-matcha-deep);
      font-size: 15px;
    }

    .product-summary-pills {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .summary-pill {
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid transparent;
    }

    .summary-pill.done {
      color: var(--jp-matcha-deep);
      background: #edf6f0;
      border-color: #c5dfd0;
    }

    .summary-pill.wait {
      color: #a86f42;
      background: #fff6ee;
      border-color: #f2dcc4;
    }

    .product-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 8px;
      padding: 10px 8px;
      border: 1px solid #f1ebe4;
      border-top: 3px solid #e8ddd4;
      border-radius: 12px;
      background: #fff;
      transition: box-shadow 0.2s ease;
      height: 100%;
    }

    .product-card.is-shipped {
      border-top-color: var(--jp-matcha);
      background: linear-gradient(180deg, #f3faf6 0%, #ffffff 45%);
    }

    .product-card.is-pending {
      border-top-color: #e8b88a;
      background: linear-gradient(180deg, #fff9f3 0%, #ffffff 45%);
    }

    .product-body {
      width: 100%;
      min-width: 0;
    }

    .product-thumb {
      width: 96px;
      height: 96px;
      border-radius: 12px;
      object-fit: cover;
      border: 1px solid var(--jp-border);
      background: #fff;
      flex-shrink: 0;
    }

    .product-thumb-placeholder {
      width: 96px;
      height: 96px;
      border-radius: 12px;
      border: 1px dashed #e0d2c8;
      background: #faf5f0;
      color: #b6a89d;
      font-size: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .product-name {
      color: var(--jp-ink);
      line-height: 1.4;
      font-size: 12px;
      word-break: break-word;
      margin-bottom: 4px;
    }

    .item-status-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .item-status-badge.done {
      color: var(--jp-matcha-deep);
      background: #edf6f0;
      border: 1px solid #c5dfd0;
    }

    .item-status-badge.wait {
      color: #a86f42;
      background: #fff6ee;
      border: 1px solid #f2dcc4;
    }

    .product-toggle {
      grid-column: 1 / -1;
      width: 100%;
      margin-top: 4px;
      padding: 8px 16px;
      border: 1px solid #efc9c9;
      border-radius: 999px;
      background: linear-gradient(180deg, #ffffff 0%, #fff5f3 100%);
      color: var(--jp-sakura-deep);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 2px 8px rgba(214, 123, 123, 0.12);
    }

    .product-toggle::before {
      content: "▾";
      margin-right: 8px;
      font-size: 13px;
    }

    .product-toggle.is-expanded::before {
      content: "▴";
    }

    .product-toggle:hover {
      background: #fff0ef;
      border-color: #e5b0b0;
      transform: translateY(-1px);
    }

    .product-toggle:active {
      transform: translateY(0);
    }

    .history-wrap {
      margin-top: 0;
      padding-top: 0;
    }

    .history-header {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      border-bottom: 1px dashed var(--jp-border);
      padding-bottom: 6px;
      color: var(--jp-ink-soft);
      font-size: 13px;
      letter-spacing: 0.12em;
      font-weight: 600;
    }

    .current-step {
      margin-left: 8px;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 12px;
      color: var(--jp-sakura-deep);
      background: #fff5f3;
      border: 1px solid #f2d4d4;
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .status-hero {
      padding: 14px 14px 12px;
      border-radius: 14px;
      border: 1px solid #f2ddd4;
      background: linear-gradient(135deg, #fffaf7 0%, #fff3eb 100%);
      border-left: 4px solid var(--jp-sakura);
    }

    .status-hero-label {
      font-size: 12px;
      color: #9a7f6f;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }

    .status-hero-title {
      font-size: 20px;
      font-weight: 700;
      color: #9d5a52;
      line-height: 1.35;
      margin-bottom: 6px;
      word-break: break-word;
    }

    .status-hero-time {
      font-size: 14px;
      color: #5f6f8f;
    }

    .status-hero-note {
      margin-top: 8px;
      font-size: 13px;
      color: #4f5f87;
      line-height: 1.4;
    }

    .status-hero-hint {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px dashed #ffd9bf;
      font-size: 12px;
      color: #7a88a8;
      line-height: 1.45;
    }

    .progress-wrap {
      margin-bottom: 14px;
      padding: 12px 10px 10px;
      border: 1px solid var(--jp-border);
      border-radius: 12px;
      background: #fff;
    }

    .progress-track {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .progress-step {
      text-align: center;
      color: #8d97ad;
      font-size: 12px;
      line-height: 1.35;
    }

    .progress-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin: 0 auto 6px;
      background: #e8ddd4;
      border: 1px solid #dccfc5;
    }

    .progress-step.is-done,
    .progress-step.is-current {
      color: #4f4a45;
      font-weight: 600;
    }

    .progress-step.is-done .progress-dot {
      background: var(--jp-matcha);
      border-color: var(--jp-matcha);
    }

    .progress-step.is-current .progress-dot {
      background: var(--jp-sakura-deep);
      border-color: var(--jp-sakura-deep);
      box-shadow: 0 0 0 3px rgba(232, 160, 160, 0.25);
    }

    .history-icon {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid #d9c8bf;
      position: relative;
      box-sizing: border-box;
    }

    .history-icon::before {
      content: "";
      position: absolute;
      width: 1px;
      height: 5px;
      background: #b0b0b0;
      left: 7px;
      top: 3px;
    }

    .history-icon::after {
      content: "";
      position: absolute;
      width: 4px;
      height: 1px;
      background: #b0b0b0;
      left: 7px;
      top: 8px;
      transform-origin: left center;
      transform: rotate(35deg);
    }

    .timeline {
      list-style: none;
      margin: 0;
      padding: 0 0 0 6px;
    }

    .timeline-item {
      position: relative;
      padding-left: 30px;
      margin-bottom: 18px;
    }

    .timeline-item::before {
      content: "";
      position: absolute;
      left: 0px;
      top: 5px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #d3d3d3;
    }

    .timeline-item::after {
      content: "";
      position: absolute;
      left: 5px;
      top: 17px;
      width: 1px;
      height: calc(100% + 8px);
      background: #d9d9d9;
    }

    .timeline-item:last-child::after {
      display: none;
    }

    .timeline-main {
      font-size: 22px;
      font-weight: 500;
      color: #3e4a5d;
      margin-bottom: 3px;
      line-height: 1.2;
    }

    .timeline-time {
      font-size: 16px;
      color: #3e4a5d;
      line-height: 1.4;
    }

    .timeline-note {
      font-size: 13px;
      color: #4e5d7a;
      margin-top: 3px;
      line-height: 1.35;
    }

    .timeline-operator {
      font-size: 12px;
      color: #7a88a6;
      margin-top: 2px;
    }

    .timeline-item.is-latest::before {
      background: #ff6a00;
    }

    .timeline-item.is-latest .timeline-main,
    .timeline-item.is-latest .timeline-time {
      color: #ff6a00;
    }

    .history-empty {
      color: #666;
      font-size: 13px;
    }

    .status {
      font-weight: bold;
      font-size: 16px;
      margin-top: 8px;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      color: var(--jp-ink-soft);
      margin-top: 24px;
      letter-spacing: 0.04em;
    }

    /* 手機版 */
    @media (max-width: 768px) {
      .app {
        flex-direction: column;
      }

      .brand {
        width: 100%;
        padding: 20px 16px;
        border-right: none;
        border-bottom: 1px solid var(--jp-border);
      }

      .brand img {
        width: 96px;
      }

      .main {
        padding: 16px 12px;
      }

      .container {
        max-width: 420px;
        padding: 20px 16px;
        border-radius: 18px;
      }

      .result-layout {
        grid-template-columns: 1fr;
      }

      .summary-top {
        grid-template-columns: 1fr;
      }

      .product-list {
        grid-template-columns: 1fr;
      }

      .progress-track {
        gap: 6px;
      }

      .progress-step {
        font-size: 11px;
      }
    }
  </style>
</head>

<body>

<div class="app">

  <!-- 左側 MAARU 品牌區 -->
  <aside class="brand">
    <!-- 🔧 把這張圖換成你的 MAARU Logo -->
    <img src="S__283426825.jpg">
    <h2>MAARU 日本萌GO</h2>
    <p>日本代購｜訂單進度查詢</p>
    <span class="brand-badge">和風查詢體驗</span>
  </aside>

  <!-- 右側查詢功能 -->
  <main class="main">
    <div class="container">

      <div class="page-head">
        <h1>訂單進度查詢</h1>
        <div class="page-sub">輸入訂單編號，查看配送進度與商品狀態</div>
      </div>

      <div class="search-panel">
        <label>請輸入訂單編號（共五碼數字）</label>
        <input type="text" id="orderId" placeholder="例如：00001" title="訂單編號為共五碼數字，例如 00001">
        <button class="btn-search" onclick="searchOrder()">查詢訂單</button>
      </div>

      <div class="result" id="resultBox">
        <div class="result-layout">
          <section class="summary-card">
            <div class="card-title">訂單摘要</div>
            <div class="summary-top">
              <div class="item">訂單編號：<span id="rOrderId"></span></div>
              <div class="item">備註：<span id="rNote"></span></div>
            </div>
            <div class="item item-products">商品內容<div id="rProduct" class="product-content"></div></div>
          </section>

          <section class="timeline-card">
            <div class="card-title">配送歷程</div>
            <div class="progress-wrap">
              <div class="progress-track" id="rProgressTrack">
                <div class="progress-step" data-step="0">
                  <div class="progress-dot"></div>
                  <div>訂單成立</div>
                </div>
                <div class="progress-step" data-step="1">
                  <div class="progress-dot"></div>
                  <div>集運中</div>
                </div>
                <div class="progress-step" data-step="2">
                  <div class="progress-dot"></div>
                  <div>已抵台</div>
                </div>
                <div class="progress-step" data-step="3">
                  <div class="progress-dot"></div>
                  <div>已出貨📦</div>
                </div>
              </div>
            </div>
            <div class="history-wrap">
              <div class="history-header">
                <span class="history-icon" aria-hidden="true"></span>
                <span>貨態追蹤</span>
                <span class="current-step" id="rCurrentStep" style="display: none;"></span>
              </div>
              <div id="rStatusHero" class="status-hero" style="display: none;"></div>
              <div class="history-empty" id="rHistoryEmpty" style="display: none;">尚無歷程記錄</div>
            </div>
          </section>
        </div>
      </div>

      <div class="error" id="errorBox">
        ⚠ 查無此訂單編號，請確認是否輸入正確
      </div>

      <div class="footer">
        如有疑問請聯絡 MAARU LINE官方帳號
      </div>

    </div>
  </main>

</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycby69CThnF5mE-ILJGhHr0iSCkBaqJKjY8tCpF69BNlW6FohHXXbMrTYvh9j4nj9jATJ/exec";
  const PROGRESS_STEPS = ["訂單成立", "集運中", "已抵台", "已出貨📦"];

  function isUrlLike(text) {
    const v = String(text || "").trim();
    return /^https?:\/\//i.test(v) || /res\.cloudinary\.com/i.test(v);
  }

  function isEmailLike(text) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(text || "").trim());
  }

  function looksLikeJsDate(text) {
    return /GMT[+-]\d{4}/.test(String(text || "")) || /\(.*標準時間\)/.test(String(text || ""));
  }

  function sanitizeHistoryStep(step) {
    let status = String(step.status || "").trim();
    let note = String(step.note || "").trim();

    if (isUrlLike(status) && note && !isUrlLike(note)) {
      status = note;
      note = "";
    }
    if (isUrlLike(status)) status = "狀態更新";
    if (isUrlLike(note) || isEmailLike(note) || looksLikeJsDate(note)) note = "";

    return {
      status,
      note,
      time: String(step.time || "").trim()
    };
  }

  function getDisplayStatus(step) {
    return extractPrimaryStatus(sanitizeHistoryStep(step).status) || "狀態更新";
  }

  /** 歷程若誤貼多行品項狀態，只取整單代表狀態顯示 */
  function extractPrimaryStatus(statusText) {
    const lines = String(statusText || "")
      .split(/\n|；|;/)
      .map(s => s.trim())
      .filter(Boolean);
    if (lines.length <= 1) return lines[0] || String(statusText || "").trim();

    const rules = [
      /已出貨|已寄出|賣貨便|7-11/,
      /已抵台|到台|抵達台灣/,
      /集運中|轉運/,
      /日本出荷|待出荷|出荷/,
      /已採購|訂單成立|待到貨|待出貨/
    ];
    for (const rule of rules) {
      const hit = lines.find(line => rule.test(line));
      if (hit) return hit;
    }
    return lines[0];
  }

  function formatOrderNote(noteText) {
    const text = String(noteText || "").trim();
    if (!text || isUrlLike(text) || isEmailLike(text) || looksLikeJsDate(text)) return "-";
    return text;
  }

  function normalizeHistory(historyData, fallbackStatus, fallbackUpdated) {
    const toTimestamp = (value) => {
      if (!value) return 0;
      const normalized = String(value).replace(/\//g, "-");
      const t = new Date(normalized).getTime();
      return Number.isNaN(t) ? 0 : t;
    };

    const sortNewestFirst = (list) => {
      return list.slice().sort((a, b) => toTimestamp(b.time) - toTimestamp(a.time));
    };

    if (Array.isArray(historyData) && historyData.length > 0) {
      const list = historyData
        .map(item => sanitizeHistoryStep({
          status: item.status || item.state || "",
          time: item.time || item.updated || item.date || "",
          note: item.note || item.remark || ""
        }))
        .filter(item => item.status || item.time);
      return sortNewestFirst(list);
    }

    if (typeof historyData === "string" && historyData.trim()) {
      const list = historyData
        .split(/\n|；|;/)
        .map(raw => raw.trim())
        .filter(Boolean)
        .map(text => {
          const firstColon = text.indexOf("：");
          const normalColon = text.indexOf(":");
          const idx = firstColon >= 0 ? firstColon : normalColon;

          if (idx > -1) {
            return {
              time: text.slice(0, idx).trim(),
              status: text.slice(idx + 1).trim(),
              note: ""
            };
          }
          return sanitizeHistoryStep({ status: text, time: "", note: "" });
        });
      return sortNewestFirst(list);
    }

    if (fallbackStatus || fallbackUpdated) {
      return [sanitizeHistoryStep({
        status: fallbackStatus || "狀態更新",
        time: fallbackUpdated || "",
        note: ""
      })];
    }

    return [];
  }

  function renderHistory(history, items, itemSummary) {
    const statusHero = document.getElementById("rStatusHero");
    const historyEmpty = document.getElementById("rHistoryEmpty");
    const currentStep = document.getElementById("rCurrentStep");
    statusHero.innerHTML = "";
    statusHero.style.display = "none";
    currentStep.style.display = "none";
    currentStep.innerText = "";

    if (!history.length) {
      historyEmpty.style.display = "block";
      renderProgress("");
      return;
    }

    historyEmpty.style.display = "none";
    const latest = sanitizeHistoryStep(history[0]);
    const primaryStatus = extractPrimaryStatus(latest.status) || "狀態更新";

    currentStep.innerText = "目前進度：" + primaryStatus;
    currentStep.style.display = "inline-block";

    const label = document.createElement("div");
    label.className = "status-hero-label";
    label.innerText = "整單目前進度";

    const title = document.createElement("div");
    title.className = "status-hero-title";
    title.innerText = primaryStatus;

    const time = document.createElement("div");
    time.className = "status-hero-time";
    time.innerText = latest.time || "時間待更新";

    statusHero.appendChild(label);
    statusHero.appendChild(title);
    statusHero.appendChild(time);

    if (latest.note) {
      const note = document.createElement("div");
      note.className = "status-hero-note";
      note.innerText = "備註：" + latest.note;
      statusHero.appendChild(note);
    }

    const summary = itemSummary && itemSummary.total
      ? itemSummary
      : (Array.isArray(items) ? buildItemSummary(normalizeProductItems("", items)) : null);
    if (summary && summary.total > 1) {
      const hint = document.createElement("div");
      hint.className = "status-hero-hint";
      hint.innerText = "此訂單含 " + summary.total + " 項商品（已出貨 "
        + summary.shipped + " / 待到貨 " + summary.pending + "），請至左側「訂單摘要」查看各商品圖片與狀態。";
      statusHero.appendChild(hint);
    }

    statusHero.style.display = "block";
    renderProgress(primaryStatus);
  }

  function cloudinaryThumb(url) {
    const imageUrl = String(url || "").trim();
    if (!imageUrl) return "";
    if (!/res\.cloudinary\.com/i.test(imageUrl)) return imageUrl;
    if (/\/upload\/(?:w_|h_|c_|q_|f_)/.test(imageUrl)) return imageUrl;
    return imageUrl.replace("/upload/", "/upload/w_220,h_220,c_fill,q_auto,f_auto/");
  }

  function normalizeItemStatusCode(code, label) {
    const c = String(code || "").trim();
    if (c === "shipped") return "shipped";
    const text = String(label || "").trim();
    if (/已出貨|已寄出|已到貨|配送中|賣貨便|7-11/.test(text)) return "shipped";
    return "pending";
  }

  function normalizeProductItems(productText, items) {
    if (Array.isArray(items) && items.length > 0) {
      return items
        .map(item => {
          const rawName = String(item.name || item.product || "").trim();
          const image = String(item.image || item.imageUrl || "").trim();
          const label = String(item.itemStatus || item.status || "").trim() || "待到貨";
          const code = normalizeItemStatusCode(item.itemStatusCode, label);
          return {
            name: isUrlLike(rawName) ? "商品" : rawName,
            image: image || (isUrlLike(rawName) ? rawName : ""),
            itemStatus: code === "shipped" ? "已出貨" : (label || "待到貨"),
            itemStatusCode: code
          };
        })
        .filter(item => item.name);
    }

    const text = String(productText || "").trim();
    if (!text) return [];
    return text
      .split(/\n|；|;/)
      .map(name => {
        const raw = name.trim().replace(/^\d+[、.．]\s*/, "");
        return {
          name: isUrlLike(raw) ? "商品" : raw,
          image: isUrlLike(raw) ? raw : "",
          itemStatus: "待到貨",
          itemStatusCode: "pending"
        };
      })
      .filter(item => item.name);
  }

  function buildItemSummary(list) {
    const total = list.length;
    const shipped = list.filter(item => item.itemStatusCode === "shipped").length;
    return { total, shipped, pending: Math.max(total - shipped, 0) };
  }

  function renderProductSummary(list, summaryData) {
    const summary = summaryData && summaryData.total
      ? summaryData
      : buildItemSummary(list);
    if (summary.total <= 1) return null;

    const wrap = document.createElement("div");
    wrap.className = "product-summary";

    const left = document.createElement("div");
    left.innerHTML = "出貨進度 <strong>" + summary.shipped + " / " + summary.total + "</strong> 件";

    const pills = document.createElement("div");
    pills.className = "product-summary-pills";

    const donePill = document.createElement("span");
    donePill.className = "summary-pill done";
    donePill.innerText = "已出貨 " + summary.shipped;

    const waitPill = document.createElement("span");
    waitPill.className = "summary-pill wait";
    waitPill.innerText = "待到貨 " + summary.pending;

    pills.appendChild(donePill);
    pills.appendChild(waitPill);
    wrap.appendChild(left);
    wrap.appendChild(pills);
    return wrap;
  }

  function createProductCard(item) {
    const card = document.createElement("li");
    const code = item.itemStatusCode === "shipped" ? "shipped" : "pending";
    card.className = "product-card " + (code === "shipped" ? "is-shipped" : "is-pending");

    const thumbUrl = cloudinaryThumb(item.image);
    if (thumbUrl) {
      const img = document.createElement("img");
      img.className = "product-thumb";
      img.src = thumbUrl;
      img.alt = item.name;
      img.loading = "lazy";
      img.onerror = () => {
        img.remove();
        const placeholder = document.createElement("div");
        placeholder.className = "product-thumb-placeholder";
        placeholder.innerText = "📦";
        card.insertBefore(placeholder, card.firstChild);
      };
      card.appendChild(img);
    } else {
      const placeholder = document.createElement("div");
      placeholder.className = "product-thumb-placeholder";
      placeholder.innerText = "📦";
      card.appendChild(placeholder);
    }

    const body = document.createElement("div");
    body.className = "product-body";

    const name = document.createElement("div");
    name.className = "product-name";
    name.innerText = item.name;
    body.appendChild(name);

    const badge = document.createElement("span");
    badge.className = "item-status-badge " + (code === "shipped" ? "done" : "wait");
    badge.innerText = (code === "shipped" ? "✓ " : "⏳ ") + (item.itemStatus || (code === "shipped" ? "已出貨" : "待到貨"));
    body.appendChild(badge);

    card.appendChild(body);
    return card;
  }

  function renderProduct(productText, items, itemSummary) {
    const productBox = document.getElementById("rProduct");
    const list = normalizeProductItems(productText, items);
    productBox.innerHTML = "";

    if (!list.length) {
      productBox.innerText = "-";
      return;
    }

    const summaryEl = renderProductSummary(list, itemSummary);
    if (summaryEl) productBox.appendChild(summaryEl);

    const ul = document.createElement("ul");
    ul.className = "product-list";
    const defaultVisibleCount = 2;
    const isExpandable = list.length > defaultVisibleCount;
    let isExpanded = false;

    const renderItems = () => {
      ul.innerHTML = "";
      const visibleItems = (isExpandable && !isExpanded)
        ? list.slice(0, defaultVisibleCount)
        : list;
      visibleItems.forEach((item) => ul.appendChild(createProductCard(item)));
    };

    renderItems();
    productBox.appendChild(ul);

    if (!isExpandable) return;

    const toggleBtn = document.createElement("button");
    toggleBtn.type = "button";
    toggleBtn.className = "product-toggle";
    toggleBtn.innerText = "展開更多";
    toggleBtn.onclick = () => {
      isExpanded = !isExpanded;
      toggleBtn.innerText = isExpanded ? "收合" : "展開更多";
      toggleBtn.classList.toggle("is-expanded", isExpanded);
      renderItems();
    };
    productBox.appendChild(toggleBtn);
  }

  function getProgressIndex(statusText) {
    const text = String(statusText || "");
    if (!text) return -1;

    if (/訂單成立|已採購|待採購|待出貨|備貨/.test(text)) return 0;
    // 日本出荷只顯示在下方貨態追蹤，不點亮上方節點
    if (/日本出荷|待出荷|出荷準備|日本端出荷/.test(text)) return -1;
    if (/集運中|轉運|物流中心|包裹配達|已收件/.test(text)) return 1;
    if (/已抵台|已抵達台灣|到台|到台灣|抵達台灣|清關完成/.test(text)) return 2;
    if (/已出貨|發貨|已寄出|配送中|運送中|賣貨便|7-11/.test(text)) return 3;
    return -1;
  }

  function renderProgress(latestStatus) {
    const track = document.getElementById("rProgressTrack");
    if (!track) return;
    const statusText = String(latestStatus || "");
    const currentIndex = getProgressIndex(latestStatus);
    const steps = track.querySelectorAll(".progress-step");
    const onlyCurrentForTransit = /集運中|轉運|物流中心|包裹配達|已收件/.test(statusText);

    steps.forEach((stepEl, idx) => {
      stepEl.classList.remove("is-done", "is-current");
      if (currentIndex < 0) return;
      if (!onlyCurrentForTransit && idx < currentIndex) stepEl.classList.add("is-done");
      if (idx === currentIndex) stepEl.classList.add("is-current");
    });
  }

  function searchOrder() {
    const orderId = document.getElementById("orderId").value.trim();
    const resultBox = document.getElementById("resultBox");
    const errorBox = document.getElementById("errorBox");

    resultBox.style.display = "none";
    errorBox.style.display = "none";

    if (!orderId) {
      errorBox.style.display = "block";
      return;
    }

    fetch(API_URL + "?orderId=" + encodeURIComponent(orderId))
      .then(res => res.json())
      .then(data => {
        if (data.error) {
          errorBox.style.display = "block";
        } else {
          document.getElementById("rOrderId").innerText = data.orderId;
          renderProduct(data.product, data.items, data.itemSummary);
          document.getElementById("rNote").innerText = formatOrderNote(data.note);
          const history = normalizeHistory(data.history, data.status, data.updated);
          renderHistory(history, data.items, data.itemSummary);
          resultBox.style.display = "block";
        }
      })
      .catch(() => {
        errorBox.style.display = "block";
      });
  }
</script>
